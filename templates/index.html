<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 知识库对话</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
    }
    .header h1 {
      margin: 0;
      font-size: 24px;
    }
    .header p {
      margin: 8px 0 0;
      opacity: 0.92;
    }
    .chat-box {
      height: 60vh;
      overflow-y: auto;
      padding: 20px;
      background: #f9fafb;
    }
    .message {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }
    .bubble {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .assistant .bubble {
      background: #ffffff;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .meta {
      font-size: 12px;
      color: #6b7280;
    }
    .sources {
      margin-top: 8px;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 10px;
      font-size: 13px;
      color: #374151;
    }
    .composer {
      display: flex;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }
    textarea {
      flex: 1;
      min-height: 56px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      outline: none;
    }
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    button {
      width: 120px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .tips {
      padding: 12px 16px 0;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>RAG 知识库对话窗口</h1>
        <p>本地知识库检索 + 通义千问回答</p>
      </div>

      <div class="tips">
        先确保已运行过 python main.py 构建知识库，并在 .env 中配置 DASHSCOPE_API_KEY。
      </div>

      <div id="chatBox" class="chat-box">
        <div class="message assistant">
          <div class="meta">知识库助手</div>
          <div class="bubble">你好，输入你的问题，我会基于本地知识库内容进行回答。</div>
        </div>
      </div>

      <div class="composer">
        <textarea id="messageInput" placeholder="请输入你的问题，例如：这个文档讲了什么？"></textarea>
        <button id="sendButton">发送</button>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    function appendMessage(role, text, sources = []) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = role === 'user' ? '你' : '知识库助手';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(meta);
      wrapper.appendChild(bubble);

      if (role === 'assistant' && sources.length) {
        const sourceBox = document.createElement('div');
        sourceBox.className = 'sources';
        sourceBox.innerHTML = '<strong>检索片段：</strong><br>' + sources.map((item, index) => `${index + 1}. ${item}`).join('<br><br>');
        wrapper.appendChild(sourceBox);
      }

      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      appendMessage('user', message);
      messageInput.value = '';
      sendButton.disabled = true;
      sendButton.textContent = '发送中...';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        if (!response.ok) {
          appendMessage('assistant', `请求失败：${data.error || '未知错误'}`);
          return;
        }

        appendMessage('assistant', data.answer || '未返回答案', data.sources || []);
      } catch (error) {
        appendMessage('assistant', `网络错误：${error.message}`);
      } finally {
        sendButton.disabled = false;
        sendButton.textContent = '发送';
        messageInput.focus();
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
