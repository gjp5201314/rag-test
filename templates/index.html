<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地知识库控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="noise"></div>
  <main class="shell">
    <section class="hero-panel">
      <div class="hero-copy">
        <p class="eyebrow">LOCAL ARCHIVE · QWEN</p>
        <h1>本地知识库控制台</h1>
        <p class="lead">
          将你的本地文档目录编织成一个可检索、可追问、可落地使用的知识界面。
          选择知识库，上传文件，构建索引，然后开始提问。
        </p>
      </div>

      <div class="status-card">
        <div>
          <span class="label">系统状态</span>
          <strong id="statusBadge" class="status-badge idle">检测中</strong>
        </div>
        <dl class="status-grid">
          <div>
            <dt>当前知识库</dt>
            <dd id="currentKbName">-</dd>
          </div>
          <div>
            <dt>索引状态</dt>
            <dd id="loadedState">-</dd>
          </div>
          <div>
            <dt>分片数量</dt>
            <dd id="documentCount">0</dd>
          </div>
          <div>
            <dt>模型密钥</dt>
            <dd id="apiState">-</dd>
          </div>
        </dl>
      </div>
    </section>

    <section class="workspace-grid">
      <article class="panel form-panel">
        <div class="panel-head">
          <p class="kicker">STEP 1</p>
          <h2>知识库管理</h2>
        </div>

        <div class="kb-tabs-section">
          <div class="kb-tabs-header">
            <span class="kb-tabs-label">选择知识库</span>
            <div class="kb-tabs-actions">
              <button type="button" id="createKbBtn" class="ghost-btn small">+ 新建</button>
            </div>
          </div>
          <div id="kbTabs" class="kb-tabs">
            <button type="button" class="kb-tab active" data-kb-id="default">
              <span class="kb-tab-name">默认知识库</span>
              <span class="kb-tab-count">0 分片</span>
            </button>
          </div>
        </div>

        <div id="createKbForm" class="create-kb-form hidden">
          <label>
            <span>知识库名称</span>
            <input type="text" id="newKbName" placeholder="输入知识库名称" />
          </label>
          <label>
            <span>描述（可选）</span>
            <input type="text" id="newKbDesc" placeholder="输入描述" />
          </label>
          <div class="form-actions">
            <button type="button" id="confirmCreateKb" class="action-btn primary">创建</button>
            <button type="button" id="cancelCreateKb" class="ghost-btn">取消</button>
          </div>
        </div>

        <div class="kb-detail-section">
          <div class="kb-detail-header">
            <h3 id="currentKbTitle">默认知识库</h3>
            <button type="button" id="deleteKbBtn" class="ghost-btn small danger hidden">删除知识库</button>
          </div>
          
          <div class="upload-section">
            <label class="upload-label">
              <span>上传文件</span>
              <input type="file" id="fileInput" multiple accept=".txt,.md,.pdf,.docx,.doc,.pptx,.ppt,.xlsx,.xls,.py,.js,.json,.yaml,.yml,.csv,.html,.css" />
              <div class="upload-hint">支持: txt, md, pdf, docx, doc, pptx, ppt, xlsx, xls, py, js, json, yaml, csv, html, css</div>
            </label>
            <button type="button" id="uploadBtn" class="action-btn">上传文件</button>
          </div>

          <div id="fileList" class="file-list">
            <div class="empty-state">暂无上传文件</div>
          </div>

          <div class="build-section">
            <div class="two-col">
              <label>
                <span>分片长度</span>
                <input type="number" id="chunkSize" value="1000" min="100" step="50" />
              </label>
              <label>
                <span>重叠长度</span>
                <input type="number" id="chunkOverlap" value="200" min="0" step="10" />
              </label>
            </div>
            <button type="button" id="buildBtn" class="action-btn primary">构建索引</button>
          </div>

          <div id="buildMessage" class="message-card muted">等待操作。</div>
        </div>
      </article>

      <article class="panel qa-panel">
        <div class="panel-head">
          <p class="kicker">STEP 2</p>
          <h2>开始提问</h2>
        </div>

        <form id="askForm" class="stack-form">
          <label>
            <span>问题</span>
            <textarea name="question" rows="5" placeholder="例如：这个项目是如何检索本地文件并调用千问生成回答的？"></textarea>
          </label>

          <div class="ask-kb-section">
            <span class="kb-tabs-label">选择知识库</span>
            <div id="askKbTabs" class="kb-tabs small">
              <button type="button" class="kb-tab active" data-kb-id="default">
                <span class="kb-tab-name">默认知识库</span>
              </button>
            </div>
          </div>

          <div class="two-col">
            <label>
              <span>Top-K</span>
              <input type="number" name="top_k" value="5" min="1" max="20" />
            </label>
          </div>

          <button type="submit" class="action-btn">发送问题</button>
        </form>

        <div id="answerBlock" class="answer-block empty">
          <div class="answer-header">
            <span>模型回答</span>
            <span id="answerMeta">尚未提问</span>
          </div>
          <div id="answerContent" class="answer-content">这里会显示千问基于检索上下文生成的回答。</div>
        </div>
      </article>
    </section>

    <section class="results-panel panel">
      <div class="panel-head inline">
        <div>
          <p class="kicker">RETRIEVAL TRACE</p>
          <h2>命中文档分片</h2>
        </div>
        <button id="refreshStatusBtn" class="ghost-btn" type="button">刷新状态</button>
      </div>
      <div id="resultsList" class="results-list empty">
        <div class="empty-state">提问后会展示命中的文件、分片号、相似度与片段内容。</div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
